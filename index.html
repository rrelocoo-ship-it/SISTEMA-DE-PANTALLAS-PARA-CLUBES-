<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA WPE - CONTROL OFICIAL</title>
    <style>
        :root {
            --fondo: #000000;
            --primario: #ccff00; /* Amarillo Neón */
            --texto: #ffffff;
            --alerta: #ff0000;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
        }

        #bloqueo { 
            display: none; 
            padding: 100px 20px; 
            background: #000; 
            color: var(--alerta); 
            font-size: 30px; 
            text-align: center;
            border: 5px solid var(--alerta);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--primario);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .logo { font-size: 48px; color: var(--primario); }
        
        .grid-canchas {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .cancha-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
        }

        .cancha-numero { font-size: 24px; color: var(--primario); }
        .partido-info { font-size: 28px; height: 70px; margin: 10px 0; color: #ccc; }
        .timer { font-size: 40px; text-align: right; color: var(--primario); }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h1>⚠️ LICENCIA NO AUTORIZADA</h1>
        <p>Este sistema es propiedad exclusiva de CIRCUITO WPE.<br>Contacte al administrador para habilitar el servicio.</p>
    </div>

    <div id="app-principal">
        <div class="header">
            <div class="logo">CIRCUITO WPE</div>
            <div id="reloj-central" style="font-size: 32px;">00:00:00</div>
        </div>

        <div id="contenedor-canchas" class="grid-canchas">
            </div>
    </div>

    <script>
        // 1. CERROJO DE SEGURIDAD
        (function() {
            const urlPermitida = "rrelocoo-ship-it.github.io";
            const urlActual = window.location.hostname;
            if (urlActual !== urlPermitida && urlActual !== "localhost" && urlActual !== "127.0.0.1") {
                document.getElementById('app-principal').style.display = 'none';
                document.getElementById('bloqueo').style.display = 'block';
            }
        })();

        // 2. CONFIGURACIÓN DE TU EXCEL
        const SPREADSHEET_ID = '1hgPIXVfeNvvNfY6h204cJFqeTxGm66dohcjmNRvhef8';
        const GID = '232783951';
        const URL_CSV = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

        async function traerDatos() {
            try {
                const respuesta = await fetch(URL_CSV);
                const texto = await respuesta.text();
                const filas = texto.split('\n').slice(1); // Ignorar cabecera
                renderizarCanchas(filas);
            } catch (e) {
                console.error("Error leyendo Excel:", e);
            }
        }

        function renderizarCanchas(filas) {
            const contenedor = document.getElementById('contenedor-canchas');
            contenedor.innerHTML = '';
            
            // Limitamos a 4 canchas por pantalla para que se vea bien (rotativo)
            filas.slice(0, 4).forEach((fila, index) => {
                const columnas = fila.split('","').map(c => c.replace(/"/g, ''));
                // Asumiendo columnas: Cancha, Jugadores, Estado, Tiempo
                const cancha = columnas[0] || (index + 1);
                const partido = columnas[1] || "ESPERANDO JUGADORES";
                const tiempo = columnas[3] || "00:00";

                contenedor.innerHTML += `
                    <div class="cancha-card">
                        <div class="cancha-numero">CANCHA ${cancha}</div>
                        <div class="partido-info">${partido}</div>
                        <div class="timer">${tiempo}</div>
                    </div>
                `;
            });
        }

        // Reloj y Actualización automática
        setInterval(() => {
            document.getElementById('reloj-central').innerText = new Date().toLocaleTimeString();
        }, 1000);

        setInterval(traerDatos, 15000); // Actualiza cada 15 seg
        traerDatos();
    </script>
</body>
</html>
