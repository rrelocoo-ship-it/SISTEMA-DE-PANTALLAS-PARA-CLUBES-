<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WPE MATCHVIEW PRO - GRAN WILLY</title>
    <style>
        :root { 
            --primario: #ccff00; 
            --fondo: #000; 
            --gris: #111; 
            --acento: #333; 
            --rojo: #ff0000;
            --verde-estado: #00ff00;
            --amarillo-estado: #ffcc00;
            --azul-estado: #0066ff;
        }
        body { margin: 0; background: var(--fondo); color: #fff; font-family: 'Arial Black', sans-serif; text-transform: uppercase; overflow: hidden; }
        .slide { display: none; height: 100vh; padding: 20px; box-sizing: border-box; flex-direction: column; }
        .active { display: flex; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--primario); padding-bottom: 15px; margin-bottom: 15px; }
        .logo-wpe { font-size: 38px; color: var(--primario); font-weight: 900; }
        .reloj { font-size: 40px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 15px; flex-grow: 1; }
        
        .card { background: var(--gris); border-radius: 20px; padding: 20px; border: 2px solid var(--acento); display: flex; flex-direction: column; position: relative; align-items: center; justify-content: center; text-align: center; }
        
        .cancha-n { position: absolute; top: 10px; left: 20px; font-size: 24px; color: var(--primario); font-weight: 900; }
        .instancia { position: absolute; top: 10px; right: 20px; font-size: 22px; color: #888; }
        
        /* CONTENEDORES CENTRADOS */
        .pareja-cont { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100px; }
        .jugador { font-size: 45px; line-height: 0.95; font-weight: 900; letter-spacing: -2px; width: 100%; }
        .llego { color: var(--primario); } 
        .no-llego { color: #fff; } 
        
        .vs { font-size: 18px; color: var(--primario); margin: 8px 0; font-weight: bold; width: 100%; }
        
        /* PIE DE TARJETA */
        .footer-card { width: 100%; margin-top: auto; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--acento); padding-top: 10px; }
        .cat { font-size: 24px; color: var(--primario); }
        .estado-txt { font-size: 20px; font-weight: bold; padding: 6px 18px; border-radius: 8px; min-width: 140px; }

        .est-enjuego { background-color: var(--verde-estado); color: #000; }
        .est-finalizado { background-color: var(--amarillo-estado); color: #000; }
        .est-proximo { background-color: var(--azul-estado); color: #fff; }
        .est-normal { background: #222; color: #fff; border: 1px solid var(--acento); }

        .llamando { animation: flash 1s infinite; border: 4px solid var(--rojo) !important; }
        @keyframes flash { 0%, 100% { background: var(--gris); } 50% { background: #500; } }

        /* TABLÓN DE ANUNCIOS CENTRADO */
        .aviso-card { background: #1a1a1a; border: 3px solid var(--primario); }
        .aviso-header { font-size: 30px; color: var(--primario); font-weight: 900; text-decoration: underline; margin-bottom: 20px; }
        .aviso-body { font-size: 42px; line-height: 1.1; color: #fff; font-weight: 900; }
    </style>
</head>
<body>
    <div id="app">
        <div class="slide active"><div class="header" id="h1"></div><div class="grid" id="g1"></div></div>
        <div class="slide"><div class="header" id="h2"></div><div class="grid" id="g2"></div></div>
        <div class="slide"><div class="header" id="h3"></div><div class="grid" id="g3"></div></div>
        <div class="slide"><div class="header" id="h4"></div><div class="grid" id="g4"></div></div>
    </div>

    <script>
        const ID = "1hgPIXVfeNvvNfY6h204cJFqeTxGm66dohcjmNRvhef8";
        const GID = "232783951"; 
        const hHTML = `<div class="logo-wpe">CIRCUITO WPE - GRAN WILLY</div><div class="reloj">00:00</div>`;
        document.querySelectorAll('.header').forEach(h => h.innerHTML = hHTML);

        let cur = 0;
        setInterval(() => {
            const ss = document.querySelectorAll('.slide');
            ss.forEach(s => s.classList.remove('active'));
            cur = (cur + 1) % 4;
            ss[cur].classList.add('active');
        }, 10000);

        async function load() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${ID}/gviz/tq?tqx=out:csv&gid=${GID}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split('\n').slice(1).map(r => r.split('","').map(c => c.replace(/"/g, '')));

                const crearCard = (r, index) => {
                    if (!r || !r[1] || r[1].trim() === "") return `<div class="card" style="opacity:0.1"></div>`;
                    
                    const estRaw = (r[5] || "").toUpperCase().trim();

                    if (index === 7) { 
                        let claseAlertaAviso = estRaw.includes("LLAMANDO") ? "llamando" : "";
                        return `
                            <div class="card aviso-card ${claseAlertaAviso}">
                                <div class="aviso-header">${r[1] || "AVISO GENERAL"}</div>
                                <div class="aviso-body">${r[2] || "MESA DE CONTROL"}</div>
                                <div style="position:absolute; bottom:10px; right:20px; font-size:14px; color:#555">WPE STAFF</div>
                            </div>`;
                    }

                    const cancha = r[0];    
                    const p1_nombres = (r[1] || "").split('/'); 
                    const p2_nombres = (r[2] || "").split('/'); 
                    const cat = r[3];       
                    const ins = r[4];       
                    
                    const j1_p1_llego = r[7] ? 'llego' : 'no-llego'; 
                    const j2_p1_llego = r[8] ? 'llego' : 'no-llego'; 
                    const j1_p2_llego = r[9] ? 'llego' : 'no-llego'; 
                    const j2_p2_llego = r[10] ? 'llego' : 'no-llego'; 

                    let claseEstado = "est-normal";
                    let claseAlerta = "";
                    if (estRaw.includes("LLAMANDO")) { claseAlerta = "llamando"; }
                    else if (estRaw.includes("EN JUEGO")) { claseEstado = "est-enjuego"; }
                    else if (estRaw.includes("FINALIZADO")) { claseEstado = "est-finalizado"; }
                    else if (estRaw.includes("PROXIMO") || estRaw.includes("PRÓXIMO")) { claseEstado = "est-proximo"; }

                    return `
                        <div class="card ${claseAlerta}">
                            <div class="cancha-n">CANCHA ${cancha}</div>
                            <div class="instancia">${ins}</div>
                            
                            <div class="pareja-cont" style="margin-top:20px">
                                <div class="jugador ${j1_p1_llego}">${p1_nombres[0] || ""}</div>
                                <div class="jugador ${j2_p1_llego}">${p1_nombres[1] || ""}</div>
                            </div>
                            
                            <div class="vs">V S</div>
                            
                            <div class="pareja-cont">
                                <div class="jugador ${j1_p2_llego}">${p2_nombres[0] || ""}</div>
                                <div class="jugador ${j2_p2_llego}">${p2_nombres[1] || ""}</div>
                            </div>

                            <div class="footer-card">
                                <div class="cat">${cat}</div>
                                <div class="estado-txt ${claseEstado}">${estRaw}</div>
                            </div>
                        </div>`;
                };

                document.getElementById('g1').innerHTML = crearCard(rows[0],0)+crearCard(rows[1],1)+crearCard(rows[2],2)+crearCard(rows[3],3);
                document.getElementById('g2').innerHTML = crearCard(rows[4],4)+crearCard(rows[5],5)+crearCard(rows[6],6)+crearCard(rows[7],7);
                document.getElementById('g3').innerHTML = crearCard(rows[8],8)+crearCard(rows[9],9)+crearCard(rows[10],10)+crearCard(rows[11],11);
                document.getElementById('g4').innerHTML = crearCard(rows[12],12)+crearCard(rows[13],13)+crearCard(rows[14],14)+crearCard(rows[15],15);

            } catch(e) { console.log("Error de red..."); }
        }

        setInterval(() => {
            const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.querySelectorAll('.reloj').forEach(r => r.innerText = t);
        }, 1000);
        setInterval(load, 15000);
        load();
    </script>
</body>
</html>
