<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WPE - ALERTA MÁXIMA</title>
    <style>
        :root { 
            --amarillo: #ccff00; --negro: #0a0a0a; --gris: #151515; 
            --azul: #0080ff; --rosa: #ff007f; --rojo: #ff3333; --verde: #00ff44;
        }
        body { 
            background-color: var(--negro); color: white; font-family: 'Arial Black', sans-serif; 
            margin: 0; padding: 10px; overflow: hidden; display: flex; flex-direction: column; 
            height: 100vh; box-sizing: border-box; 
        }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 6px solid var(--amarillo); padding: 5px 25px; margin-bottom: 10px; 
        }
        .logo-header { height: 100px; width: auto; }
        #reloj { font-size: 4rem; color: white; font-family: monospace; font-weight: bold; }

        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; 
            gap: 20px; flex-grow: 1; 
        }
        .fade { opacity: 0; transition: opacity 0.5s ease-in-out; }

        .card { 
            background: var(--gris); border: 8px solid var(--amarillo); border-radius: 40px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            align-items: center; padding: 15px; position: relative; box-sizing: border-box;
            height: 100%; width: 100%; transition: all 0.3s ease;
        }
        
        .t-inicio { position: absolute; top: 15px; left: 30px; font-size: 1.4rem; color: #aaa; }
        .t-ahora { position: absolute; top: 12px; right: 30px; font-size: 2.2rem; font-weight: bold; }
        
        .c-n { font-size: 3.2rem; color: var(--amarillo); margin-top: 15px; line-height: 1; }
        .fase-tag { font-size: 1.6rem; color: #000; background: #fff; padding: 4px 35px; border-radius: 10px; text-transform: uppercase; font-weight: 900; }

        .cat { padding: 8px 0; border-radius: 15px; font-size: 2rem; width: 90%; text-align: center; background: #333; text-transform: uppercase; }
        .cat-masc { background: var(--azul) !important; }
        .cat-fem { background: var(--rosa) !important; }
        
        .jug-linea { 
            font-size: 2.6rem; font-weight: bold; display: block; width: 100%; 
            text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 8px; 
        }
        .ausente { color: var(--rojo); }
        .presente { color: var(--verde); text-shadow: 0 0 15px rgba(0, 255, 68, 0.5); }
        .vs { font-size: 1.2rem; color: var(--amarillo); margin: 8px 0; }
        
        .est { background: var(--amarillo); color: black; width: calc(100% + 30px); padding: 15px 0; font-size: 2.4rem; font-weight: bold; text-transform: uppercase; margin-bottom: -16px; border-radius: 0 0 32px 32px; text-align: center; }
        
        /* --- ANIMACIONES DE ALERTA --- */
        
        /* Efecto para LLAMANDO: Fondo flashea en Amarillo WPE */
        .alerta-llamando { 
            animation: flash-bg-amarillo 0.6s infinite; 
            border-color: white !important;
        }
        .alerta-llamando .jug-linea { animation: flash-text 0.3s infinite; }
        .alerta-llamando .c-n { color: black !important; }

        /* Efecto para W.O.: Fondo flashea en Rojo */
        .alerta-wo { 
            animation: flash-bg-rojo 0.6s infinite; 
            border-color: white !important;
        }

        @keyframes flash-bg-amarillo { 
            0%, 100% { background: var(--gris); } 
            50% { background: var(--amarillo); } 
        }
        @keyframes flash-bg-rojo { 
            0%, 100% { background: var(--gris); } 
            50% { background: var(--rojo); } 
        }
        @keyframes flash-text { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.3; } 
        }

        .staff-card { border-color: white !important; background: #1a1a1a; }
        .staff-msg { font-size: 2.4rem; text-align: center; margin: auto; font-weight: bold; }
        .staff-msg span { color: var(--amarillo); display: block; font-size: 3.5rem; margin-top: 15px; }
    </style>
</head>
<body>
    <header>
        <img src="https://i.ibb.co/wrMqYtCC/image-3.png" alt="WPE" class="logo-header">
        <div id="reloj">00:00</div>
        <img src="https://i.ibb.co/B5H7cvQm/image-4.png" alt="Gran Willy" class="logo-header">
    </header>

    <div id="pantalla" class="grid"></div>

    <script>
        const sheetId = '1hgPIXVfeNvvNfY6h204cJFqeTxGm66dohcjmNRvhef8';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=232783951`;
        let partidosRaw = [];
        let vista = 0;
        let iniciosPartidos = JSON.parse(localStorage.getItem('iniciosWPE')) || {};

        function updateTime() {
            const d = new Date();
            document.getElementById('reloj').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
        }

        function getStatus(item) {
            if(!item || !item.h || !item.h.includes(':')) return "";
            if(item.e === "LIBRE") return "";
            
            const ahora = new Date();
            const idPartido = `${item.c}_${item.p1a}_${item.p2a}`; 

            if (item.e === "EN JUEGO") {
                if (!iniciosPartidos[idPartido]) {
                    iniciosPartidos[idPartido] = Date.now();
                    localStorage.setItem('iniciosWPE', JSON.stringify(iniciosPartidos));
                }
                let minutos = Math.floor((Date.now() - iniciosPartidos[idPartido]) / 60000);
                return `${minutos}'`;
            }

            const [horas, minutos] = item.h.split(':');
            const inicioPlanificado = new Date(); 
            inicioPlanificado.setHours(parseInt(horas), parseInt(minutos), 0, 0);
            let difPlan = Math.floor((ahora - inicioPlanificado) / 60000);
            const faltanP = (!item.p1P || !item.p1P2 || !item.p2P || !item.p2P2);

            if (item.e === "LLAMANDO") return "LLAMANDO...";
            if (difPlan >= 16 && faltanP) return `W.O. ${difPlan}'`;
            
            return "";
        }

        async function getData() {
            try {
                const r = await fetch(`${url}&t=${Date.now()}`);
                const t = await r.text();
                const j = JSON.parse(t.substring(t.indexOf("(")+1, t.lastIndexOf(")")));
                partidosRaw = j.table.rows.map(r => ({
                    c: String(r.c[0]?.v || ""),
                    p1a: (String(r.c[1]?.v || "---").split('/')[0] || "---").trim(),
                    p1b: (String(r.c[1]?.v || "---").split('/')[1] || "---").trim(),
                    p2a: (String(r.c[2]?.v || "---").split('/')[0] || "---").trim(),
                    p2b: (String(r.c[2]?.v || "---").split('/')[1] || "---").trim(),
                    cat: r.c[3]?.v || "---",
                    fase: (r.c[4]?.v || "GRUPOS").toUpperCase(),
                    e: (r.c[5]?.v || "LIBRE").toUpperCase(),
                    h: r.c[6]?.f || r.c[6]?.v || "",
                    p1P: (String(r.c[7]?.v || "")).toUpperCase() === "SI",
                    p1P2: (String(r.c[8]?.v || "")).toUpperCase() === "SI",
                    p2P: (String(r.c[9]?.v || "")).toUpperCase() === "SI",
                    p2P2: (String(r.c[10]?.v || "")).toUpperCase() === "SI"
                }));
            } catch(e) { console.error("Error Sheets"); }
        }

        function createCard(item, isAnuncio, numFijo) {
            if (isAnuncio) {
                return `<div class="card staff-card"><div class="c-n" style="color:white">ANUNCIO</div><div class="staff-msg">PRESENTARSE EN LA<br><span>MESA DE STAFF</span><br>AL LLEGAR</div><div class="est" style="background:white; color:black">TORNEO WPE</div></div>`;
            }
            if (!item || item.e === "LIBRE" || item.c === "-" || item.c === "") {
                return `<div class="card" style="opacity:0.3; border-color:#444;"><div class="c-n">CANCHA ${numFijo}</div><div class="est">LIBRE</div></div>`;
            }

            const st = getStatus(item);
            const esMasc = item.cat.toUpperCase().includes("CABALLEROS");
            const esFem = item.cat.toUpperCase().includes("DAMAS");
            
            let claseAlerta = "";
            if (item.e === "LLAMANDO") claseAlerta = "alerta-llamando";
            else if (st.includes("W.O.")) claseAlerta = "alerta-wo";

            return `<div class="card ${claseAlerta}">
                <div class="t-inicio">${item.h ? 'HORA: '+item.h : ''}</div><div class="t-ahora">${st}</div>
                <div class="c-n">CANCHA ${item.c}</div><div class="fase-tag">${item.fase}</div>
                <div class="cat ${esMasc?'cat-masc':esFem?'cat-fem':''}">${item.cat}</div>
                <div><span class="jug-linea ${item.p1P?'presente':'ausente'}">${item.p1a}</span><span class="jug-linea ${item.p1P2?'presente':'ausente'}">${item.p1b}</span></div>
                <div class="vs">v s</div>
                <div><span class="jug-linea ${item.p2P?'presente':'ausente'}">${item.p2a}</span><span class="jug-linea ${item.p2P2?'presente':'ausente'}">${item.p2b}</span></div>
                <div class="est">${item.e}</div></div>`;
        }

        function render() {
            const g = document.getElementById('pantalla');
            g.classList.add('fade');
            
            setTimeout(() => {
                g.innerHTML = '';
                if (vista === 0) [0,1,2,3].forEach(i => g.innerHTML += createCard(partidosRaw[i], false, i+1));
                else if (vista === 1) { [4,5,6].forEach(i => g.innerHTML += createCard(partidosRaw[i], false, i+1)); g.innerHTML += createCard(null, true); }
                else if (vista === 2) [8,9,10,11].forEach(i => g.innerHTML += createCard(partidosRaw[i], false, i-7));
                else if (vista === 3) { [12,13,14].forEach(i => g.innerHTML += createCard(partidosRaw[i], false, i-7)); g.innerHTML += createCard(null, true); }
                
                g.classList.remove('fade');
                vista = (vista + 1) % 4;
            }, 500);
        }

        updateTime(); setInterval(updateTime, 1000);
        setInterval(getData, 15000);
        getData().then(() => { render(); setInterval(render, 10000); });
    </script>
</body>
</html>
